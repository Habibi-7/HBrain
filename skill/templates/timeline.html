<!--
  brain timeline template — v1
  Strict template. Fill {{placeholders}} with data from `brain timeline`.
  Do not modify layout or styling. Consistency across users is the point.
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Timeline — {{range_label}}</title>
<style>
  :root {
    --bg: #fafafa; --fg: #1a1a1a; --muted: #6b7280;
    --border: #e5e7eb; --accent: #2563eb;
    --note: #6b7280; --task: #f59e0b; --decision: #8b5cf6;
    --fact: #10b981; --link: #3b82f6;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #111; --fg: #e5e5e5; --muted: #9ca3af;
      --border: #333; --accent: #60a5fa;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg); color: var(--fg);
    max-width: 640px; margin: 0 auto; padding: 2rem 1rem;
    line-height: 1.5;
  }
  h1 { font-size: 1.25rem; font-weight: 600; margin-bottom: 0.25rem; }
  .meta { color: var(--muted); font-size: 0.8rem; margin-bottom: 1.5rem; }
  .day-group { margin-bottom: 1.5rem; }
  .day-label {
    font-size: 0.75rem; font-weight: 600; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.05em;
    padding-bottom: 0.25rem; border-bottom: 1px solid var(--border);
    margin-bottom: 0.5rem;
  }
  .event {
    display: flex; gap: 0.5rem; align-items: baseline;
    padding: 0.375rem 0;
  }
  .event + .event { border-top: 1px solid var(--border); }
  .event-type {
    font-size: 0.65rem; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.04em; padding: 0.1rem 0.35rem;
    border-radius: 3px; white-space: nowrap;
    color: #fff;
  }
  .event-type--note     { background: var(--note); }
  .event-type--task     { background: var(--task); }
  .event-type--decision { background: var(--decision); }
  .event-type--fact     { background: var(--fact); }
  .event-type--link     { background: var(--link); }
  .event-time { font-size: 0.75rem; color: var(--muted); white-space: nowrap; }
  .event-body { font-size: 0.875rem; flex: 1; }
  .event-tags { font-size: 0.7rem; color: var(--muted); }
  .footer {
    margin-top: 2rem; padding-top: 0.75rem;
    border-top: 1px solid var(--border);
    font-size: 0.7rem; color: var(--muted);
  }
</style>
</head>
<body>
  <h1>Timeline</h1>
  <div class="meta">{{range_label}} · {{event_count}} events</div>

  <!-- Repeat this block for each day group -->
  {{#each day_groups}}
  <div class="day-group">
    <div class="day-label">{{this.date_label}}</div>
    {{#each this.events}}
    <div class="event">
      <span class="event-type event-type--{{this.type}}">{{this.type}}</span>
      <span class="event-time">{{this.time}}</span>
      <span class="event-body">{{this.title}}</span>
    </div>
    {{/each}}
  </div>
  {{/each}}

  <div class="footer">Generated by brain · {{generated_at}}</div>
</body>
</html>
