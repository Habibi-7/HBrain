<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#222"/>
    </marker>
  </defs>

  <rect width="1200" height="720" fill="#ffffff"/>

  <text x="40" y="44" font-family="Helvetica, Arial" font-size="22" font-weight="700" fill="#0f0f0f">Feature 2 — Retrieval + Render (Timeline)</text>
  <text x="40" y="68" font-family="Helvetica, Arial" font-size="13" fill="#666">Natural-language question → structured retrieval → rendered artifact handed back to the user.</text>

  <text x="130" y="112" text-anchor="middle" font-family="Helvetica, Arial" font-size="11" font-weight="700" letter-spacing="1" fill="#888">USER</text>
  <text x="420" y="112" text-anchor="middle" font-family="Helvetica, Arial" font-size="11" font-weight="700" letter-spacing="1" fill="#888">COMPUTER AGENT</text>
  <text x="730" y="112" text-anchor="middle" font-family="Helvetica, Arial" font-size="11" font-weight="700" letter-spacing="1" fill="#888">BRAIN HARNESS</text>
  <text x="1010" y="112" text-anchor="middle" font-family="Helvetica, Arial" font-size="11" font-weight="700" letter-spacing="1" fill="#888">VAULT</text>

  <line x1="265" y1="95" x2="265" y2="640" stroke="#eee"/>
  <line x1="575" y1="95" x2="575" y2="640" stroke="#eee"/>
  <line x1="885" y1="95" x2="885" y2="640" stroke="#eee"/>

  <rect x="40" y="155" width="180" height="70" rx="10" fill="#f5f5f7" stroke="#333" stroke-width="1.2"/>
  <text x="130" y="183" text-anchor="middle" font-family="Helvetica, Arial" font-size="12" font-weight="700" fill="#111">1 · User asks</text>
  <text x="130" y="203" text-anchor="middle" font-family="Helvetica, Arial" font-size="11" fill="#444" font-style="italic">"show me my week"</text>

  <path d="M220,190 L320,190" stroke="#222" stroke-width="1.4" fill="none" marker-end="url(#arrow)"/>

  <rect x="320" y="155" width="200" height="70" rx="10" fill="#fff" stroke="#333" stroke-width="1.4"/>
  <text x="420" y="183" text-anchor="middle" font-family="Helvetica, Arial" font-size="12" font-weight="700" fill="#111">2 · Agent picks command</text>
  <text x="420" y="203" text-anchor="middle" font-family="Menlo, monospace" font-size="11" fill="#444">brain timeline --week</text>

  <path d="M520,190 L620,190" stroke="#222" stroke-width="1.4" fill="none" marker-end="url(#arrow)"/>

  <rect x="620" y="155" width="220" height="70" rx="10" fill="#0f0f0f"/>
  <text x="730" y="185" text-anchor="middle" font-family="Menlo, monospace" font-size="15" font-weight="700" fill="#fff">brain timeline</text>
  <text x="730" y="205" text-anchor="middle" font-family="Helvetica, Arial" font-size="11" fill="#bbb">parses args · spawns subagents</text>

  <path d="M730,225 L730,275" stroke="#222" stroke-width="1.4" fill="none" marker-end="url(#arrow)"/>

  <rect x="620" y="275" width="220" height="80" rx="10" fill="#ffffff" stroke="#333" stroke-width="1.4"/>
  <text x="730" y="300" text-anchor="middle" font-family="Helvetica, Arial" font-size="13" font-weight="700" fill="#111">3 · Retrieval subagent</text>
  <text x="730" y="320" text-anchor="middle" font-family="Helvetica, Arial" font-size="11" fill="#666">structured filter + fuzzy recall</text>
  <text x="730" y="336" text-anchor="middle" font-family="Helvetica, Arial" font-size="11" fill="#666">walks index, hits vault</text>

  <path d="M840,308 L935,308" stroke="#222" stroke-width="1.4" fill="none" marker-end="url(#arrow)"/>
  <path d="M935,344 L840,344" stroke="#222" stroke-width="1.4" fill="none" marker-end="url(#arrow)"/>
  <text x="887" y="298" text-anchor="middle" font-family="Helvetica, Arial" font-size="10" fill="#666">query</text>
  <text x="887" y="360" text-anchor="middle" font-family="Helvetica, Arial" font-size="10" fill="#666">events</text>

  <g>
    <ellipse cx="1010" cy="300" rx="70" ry="13" fill="#f5f5f7" stroke="#333" stroke-width="1.4"/>
    <rect x="940" y="300" width="140" height="60" fill="#f5f5f7" stroke="#333" stroke-width="1.4"/>
    <path d="M940,360 A70,13 0 0 0 1080,360" fill="none" stroke="#333" stroke-width="1.4"/>
    <line x1="940" y1="300" x2="940" y2="360" stroke="#f5f5f7" stroke-width="2"/>
    <line x1="1080" y1="300" x2="1080" y2="360" stroke="#f5f5f7" stroke-width="2"/>
  </g>
  <text x="1010" y="328" text-anchor="middle" font-family="Helvetica, Arial" font-size="12" font-weight="600" fill="#111">Markdown vault</text>
  <text x="1010" y="345" text-anchor="middle" font-family="Helvetica, Arial" font-size="11" fill="#666">+ index</text>

  <path d="M730,355 L730,405" stroke="#222" stroke-width="1.4" fill="none" marker-end="url(#arrow)"/>

  <rect x="620" y="405" width="220" height="80" rx="10" fill="#ffffff" stroke="#333" stroke-width="1.4"/>
  <text x="730" y="430" text-anchor="middle" font-family="Helvetica, Arial" font-size="13" font-weight="700" fill="#111">4 · Render subagent</text>
  <text x="730" y="450" text-anchor="middle" font-family="Helvetica, Arial" font-size="11" fill="#666">loads HTML template</text>
  <text x="730" y="466" text-anchor="middle" font-family="Helvetica, Arial" font-size="11" fill="#666">groups events by day · styles</text>

  <rect x="900" y="410" width="160" height="70" rx="8" fill="#fafafa" stroke="#333" stroke-width="1.2" stroke-dasharray="4 3"/>
  <text x="980" y="436" text-anchor="middle" font-family="Helvetica, Arial" font-size="12" font-weight="600" fill="#111">Templates</text>
  <text x="980" y="454" text-anchor="middle" font-family="Helvetica, Arial" font-size="10" fill="#666">timeline.html · weekly.md</text>
  <text x="980" y="468" text-anchor="middle" font-family="Helvetica, Arial" font-size="10" fill="#666">read-only in vault</text>

  <path d="M900,445 L840,445" stroke="#333" stroke-width="1.2" fill="none" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

  <path d="M730,485 L730,535" stroke="#222" stroke-width="1.4" fill="none" marker-end="url(#arrow)"/>

  <rect x="620" y="535" width="220" height="70" rx="10" fill="#fff" stroke="#333" stroke-width="1.4"/>
  <text x="730" y="563" text-anchor="middle" font-family="Helvetica, Arial" font-size="13" font-weight="700" fill="#111">5 · Rendered artifact</text>
  <text x="730" y="583" text-anchor="middle" font-family="Menlo, monospace" font-size="11" fill="#444">timeline-2026-W17.html</text>

  <path d="M620,570 L555,570 L555,470 L525,470" stroke="#222" stroke-width="1.4" fill="none" marker-end="url(#arrow)"/>

  <rect x="320" y="435" width="200" height="70" rx="10" fill="#fff" stroke="#333" stroke-width="1.4"/>
  <text x="420" y="463" text-anchor="middle" font-family="Helvetica, Arial" font-size="13" font-weight="700" fill="#111">6 · Agent displays</text>
  <text x="420" y="483" text-anchor="middle" font-family="Helvetica, Arial" font-size="11" fill="#444">opens artifact inline</text>

  <path d="M320,470 L220,470" stroke="#222" stroke-width="1.4" fill="none" marker-end="url(#arrow)"/>

  <rect x="40" y="435" width="180" height="70" rx="10" fill="#f5f5f7" stroke="#333" stroke-width="1.2"/>
  <text x="130" y="463" text-anchor="middle" font-family="Helvetica, Arial" font-size="12" font-weight="700" fill="#111">7 · User sees timeline</text>
  <text x="130" y="483" text-anchor="middle" font-family="Helvetica, Arial" font-size="11" fill="#444" font-style="italic">a visual, not paragraphs</text>

  <rect x="40" y="600" width="500" height="55" rx="6" fill="#fff" stroke="#ddd"/>
  <text x="55" y="622" font-family="Helvetica, Arial" font-size="11" font-weight="700" letter-spacing="0.5" fill="#888">RETURN FOOTER (every brain call)</text>
  <text x="55" y="644" font-family="Menlo, monospace" font-size="11" fill="#333">[exit: 0 | 2.4s | $0.02 | artifact: timeline-2026-W17.html]</text>
</svg>
