<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#222"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#b83232"/>
    </marker>
  </defs>

  <rect width="1200" height="720" fill="#ffffff"/>

  <text x="40" y="44" font-family="Helvetica, Arial" font-size="22" font-weight="700" fill="#0f0f0f">Feature 1 — Capture Path + Event Schema</text>
  <text x="40" y="68" font-family="Helvetica, Arial" font-size="13" fill="#666">Any input channel → brain add → classified, validated, committed as a typed Event in the markdown vault.</text>

  <text x="130" y="112" text-anchor="middle" font-family="Helvetica, Arial" font-size="11" font-weight="700" letter-spacing="1" fill="#888">INPUT CHANNELS</text>

  <g font-family="Helvetica, Arial" font-size="13" fill="#111">
    <rect x="40" y="132" width="180" height="42" rx="8" fill="#f5f5f7" stroke="#333" stroke-width="1.2"/>
    <text x="130" y="158" text-anchor="middle">Voice / dictation</text>

    <rect x="40" y="184" width="180" height="42" rx="8" fill="#f5f5f7" stroke="#333" stroke-width="1.2"/>
    <text x="130" y="210" text-anchor="middle">Agent chat (Cowork)</text>

    <rect x="40" y="236" width="180" height="42" rx="8" fill="#f5f5f7" stroke="#333" stroke-width="1.2"/>
    <text x="130" y="262" text-anchor="middle">Forwarded email</text>

    <rect x="40" y="288" width="180" height="42" rx="8" fill="#f5f5f7" stroke="#333" stroke-width="1.2"/>
    <text x="130" y="314" text-anchor="middle">Screenshot + caption</text>

    <rect x="40" y="340" width="180" height="42" rx="8" fill="#f5f5f7" stroke="#333" stroke-width="1.2"/>
    <text x="130" y="366" text-anchor="middle">Quick-bar / shortcut</text>
  </g>

  <g stroke="#222" stroke-width="1.4" fill="none">
    <path d="M220,153 C270,153 280,240 330,240" marker-end="url(#arrow)"/>
    <path d="M220,205 C270,205 280,244 330,244" marker-end="url(#arrow)"/>
    <path d="M220,257 C270,257 280,250 330,250" marker-end="url(#arrow)"/>
    <path d="M220,309 C270,309 280,256 330,256" marker-end="url(#arrow)"/>
    <path d="M220,361 C270,361 280,262 330,262" marker-end="url(#arrow)"/>
  </g>

  <rect x="330" y="215" width="220" height="70" rx="10" fill="#0f0f0f"/>
  <text x="440" y="247" text-anchor="middle" font-family="Menlo, monospace" font-size="16" font-weight="700" fill="#fff">brain add</text>
  <text x="440" y="269" text-anchor="middle" font-family="Helvetica, Arial" font-size="11" fill="#bbb">single entry point · hooks attach here</text>

  <path d="M440,285 L440,325" stroke="#222" stroke-width="1.4" fill="none" marker-end="url(#arrow)"/>

  <rect x="330" y="325" width="220" height="80" rx="10" fill="#ffffff" stroke="#333" stroke-width="1.4"/>
  <text x="440" y="352" text-anchor="middle" font-family="Helvetica, Arial" font-size="14" font-weight="600" fill="#111">Classifier subagent</text>
  <text x="440" y="372" text-anchor="middle" font-family="Helvetica, Arial" font-size="11" fill="#666">assigns type · extracts entities</text>
  <text x="440" y="390" text-anchor="middle" font-family="Helvetica, Arial" font-size="11" fill="#666">suggests links · resolves dupes</text>

  <path d="M440,405 L440,445" stroke="#222" stroke-width="1.4" fill="none" marker-end="url(#arrow)"/>

  <polygon points="440,445 520,500 440,555 360,500" fill="#ffffff" stroke="#333" stroke-width="1.4"/>
  <text x="440" y="497" text-anchor="middle" font-family="Helvetica, Arial" font-size="13" font-weight="600" fill="#111">Validation</text>
  <text x="440" y="514" text-anchor="middle" font-family="Helvetica, Arial" font-size="13" font-weight="600" fill="#111">hook</text>

  <path d="M360,500 L270,500" stroke="#b83232" stroke-width="1.4" fill="none" marker-end="url(#arrow-red)" stroke-dasharray="5 4"/>
  <text x="315" y="490" text-anchor="middle" font-family="Helvetica, Arial" font-size="11" font-weight="600" fill="#b83232">fail</text>
  <rect x="140" y="475" width="130" height="52" rx="8" fill="#fff" stroke="#b83232" stroke-width="1.4" stroke-dasharray="5 4"/>
  <text x="205" y="497" text-anchor="middle" font-family="Helvetica, Arial" font-size="12" font-weight="600" fill="#b83232">Error → agent</text>
  <text x="205" y="515" text-anchor="middle" font-family="Helvetica, Arial" font-size="11" fill="#666">with fix hint</text>

  <path d="M440,555 L440,598" stroke="#222" stroke-width="1.4" fill="none" marker-end="url(#arrow)"/>
  <text x="460" y="580" font-family="Helvetica, Arial" font-size="11" font-weight="600" fill="#222">pass</text>

  <rect x="330" y="598" width="220" height="65" rx="10" fill="#ffffff" stroke="#333" stroke-width="1.4"/>
  <text x="440" y="626" text-anchor="middle" font-family="Helvetica, Arial" font-size="14" font-weight="600" fill="#111">Markdown writer</text>
  <text x="440" y="645" text-anchor="middle" font-family="Helvetica, Arial" font-size="11" fill="#666">one file · YAML frontmatter</text>

  <rect x="635" y="100" width="515" height="460" rx="12" fill="#fafafa" stroke="#0f0f0f" stroke-width="1.8"/>
  <text x="655" y="130" font-family="Helvetica, Arial" font-size="13" font-weight="700" letter-spacing="0.5" fill="#111">EVENT SCHEMA</text>
  <text x="655" y="148" font-family="Helvetica, Arial" font-size="11" fill="#666">The one thing to get right before building anything else.</text>
  <line x1="655" y1="162" x2="1130" y2="162" stroke="#e0e0e0" stroke-width="1"/>

  <g font-family="Menlo, monospace" font-size="12.5">
    <text x="655" y="195" font-weight="700" fill="#111">id</text>
    <text x="770" y="195" fill="#666">stable, content-hash-derived</text>

    <text x="655" y="225" font-weight="700" fill="#111">type</text>
    <text x="770" y="225" fill="#666">capture | task | decision | note | …</text>

    <text x="655" y="255" font-weight="700" fill="#111">timestamp</text>
    <text x="770" y="255" fill="#666">ISO 8601</text>

    <text x="655" y="285" font-weight="700" fill="#111">source</text>
    <text x="770" y="285" fill="#666">voice | email | screenshot | agent …</text>

    <text x="655" y="315" font-weight="700" fill="#111">tags</text>
    <text x="770" y="315" fill="#666">[project, person, topic]</text>

    <text x="655" y="345" font-weight="700" fill="#111">links</text>
    <text x="770" y="345" fill="#666">[event_id, vault path …]</text>

    <text x="655" y="375" font-weight="700" fill="#111">body</text>
    <text x="770" y="375" fill="#666">markdown — the actual content</text>
  </g>

  <line x1="655" y1="395" x2="1130" y2="395" stroke="#e0e0e0" stroke-width="1"/>

  <text x="655" y="420" font-family="Helvetica, Arial" font-size="11" font-weight="700" letter-spacing="0.5" fill="#888">STORED AS</text>
  <text x="655" y="442" font-family="Menlo, monospace" font-size="12" fill="#111">vault/events/YYYY-MM-DD-{id}.md</text>

  <text x="655" y="470" font-family="Helvetica, Arial" font-size="11" font-weight="700" letter-spacing="0.5" fill="#888">FILE SHAPE</text>
  <rect x="655" y="478" width="475" height="70" rx="6" fill="#fff" stroke="#ddd"/>
  <g font-family="Menlo, monospace" font-size="11" fill="#333">
    <text x="665" y="495">---</text>
    <text x="665" y="510">id / type / timestamp / source / tags / links</text>
    <text x="665" y="525">---</text>
    <text x="665" y="540">(markdown body here)</text>
  </g>

  <path d="M550,630 L635,630" stroke="#222" stroke-width="1.4" fill="none" marker-end="url(#arrow)"/>

  <g>
    <ellipse cx="710" cy="605" rx="75" ry="14" fill="#f5f5f7" stroke="#333" stroke-width="1.4"/>
    <rect x="635" y="605" width="150" height="55" fill="#f5f5f7" stroke="#333" stroke-width="1.4"/>
    <line x1="635" y1="605" x2="635" y2="660" stroke="#f5f5f7" stroke-width="2"/>
    <line x1="785" y1="605" x2="785" y2="660" stroke="#f5f5f7" stroke-width="2"/>
    <path d="M635,660 A75,14 0 0 0 785,660" fill="none" stroke="#333" stroke-width="1.4"/>
  </g>
  <text x="710" y="632" text-anchor="middle" font-family="Helvetica, Arial" font-size="13" font-weight="600" fill="#111">Markdown vault</text>
  <text x="710" y="650" text-anchor="middle" font-family="Helvetica, Arial" font-size="11" fill="#666">user-owned folder</text>

  <path d="M785,630 L855,630" stroke="#222" stroke-width="1.4" fill="none" marker-end="url(#arrow)"/>

  <rect x="855" y="600" width="155" height="65" rx="10" fill="#fff" stroke="#333" stroke-width="1.2" stroke-dasharray="4 3"/>
  <text x="932" y="627" text-anchor="middle" font-family="Helvetica, Arial" font-size="13" font-weight="600" fill="#111">Index</text>
  <text x="932" y="647" text-anchor="middle" font-family="Helvetica, Arial" font-size="11" fill="#666">derivative · rebuildable</text>

  <g font-family="Helvetica, Arial" font-size="11" fill="#555">
    <rect x="40" y="675" width="400" height="32" rx="6" fill="#fff" stroke="#ddd"/>
    <rect x="52" y="685" width="14" height="12" rx="2" fill="#0f0f0f"/>
    <text x="72" y="695">CLI entry</text>
    <rect x="142" y="685" width="14" height="12" rx="2" fill="#fff" stroke="#333"/>
    <text x="162" y="695">Subagent / step</text>
    <polygon points="250,685 258,691 250,697 242,691" fill="#fff" stroke="#333"/>
    <text x="270" y="695">Decision</text>
    <rect x="330" y="685" width="14" height="12" rx="2" fill="#fff" stroke="#333" stroke-dasharray="3 2"/>
    <text x="350" y="695">Derivative</text>
  </g>
</svg>
