<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Timeline — {{.RangeLabel}}</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0d0d0d;
    color: #e8e8e8;
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', Consolas, monospace;
    font-size: 13px;
    line-height: 1.5;
    padding: 2rem 2.5rem;
    max-width: 820px;
  }

  .header {
    color: #888;
    font-size: 11px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 1.75rem;
    display: flex;
    gap: 1.5rem;
  }
  .header-range { color: #fff; }

  /* ── day label ─────────────────────────────────────── */
  .day-header {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    margin-bottom: 0.25rem;
    padding-left: 0;
  }
  .day-node {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: #e53e3e;
    border: 2px solid #e53e3e;
    flex-shrink: 0;
    margin-left: 1px;
  }
  .day-label {
    color: #888;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  /* ── tree line ─────────────────────────────────────── */
  .day-group {
    display: flex;
    gap: 0;
    margin-bottom: 1.5rem;
  }
  .tree-rail {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 12px;
    flex-shrink: 0;
    margin-top: 2px;
  }
  .rail-line {
    width: 2px;
    flex: 1;
    background: #e53e3e;
    min-height: 100%;
    opacity: 0.7;
  }

  .events {
    flex: 1;
    padding-left: 1rem;
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  /* ── event row ─────────────────────────────────────── */
  .event {
    display: flex;
    align-items: baseline;
    gap: 0.65rem;
    padding: 0.2rem 0;
    border-bottom: 1px solid #1e1e1e;
  }
  .event:last-child { border-bottom: none; }

  .event-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #444;
    flex-shrink: 0;
    margin-left: -1.375rem;
    margin-right: 0.675rem;
    margin-top: 5px;
    align-self: flex-start;
  }

  .event-time {
    color: #555;
    font-size: 11px;
    width: 38px;
    flex-shrink: 0;
  }

  .event-type {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.04em;
    padding: 1px 5px;
    border-radius: 3px;
    white-space: nowrap;
    flex-shrink: 0;
    text-transform: uppercase;
  }
  .t-note     { color: #888;    border: 1px solid #333; }
  .t-task     { color: #f6ad55; border: 1px solid #744210; }
  .t-decision { color: #b794f4; border: 1px solid #44337a; }
  .t-fact     { color: #68d391; border: 1px solid #276749; }
  .t-link     { color: #63b3ed; border: 1px solid #2a4365; }

  .event-title {
    color: #d4d4d4;
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .event-tags {
    color: #444;
    font-size: 11px;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .empty {
    color: #444;
    padding: 2rem 0;
    font-style: italic;
  }

  .footer {
    margin-top: 1.5rem;
    color: #333;
    font-size: 11px;
  }
</style>
</head>
<body>

  <div class="header">
    <span class="header-range">{{.RangeLabel}}</span>
    <span>{{.EventCount}} events</span>
    <span>{{.GeneratedAt}}</span>
  </div>

  {{if .DayGroups}}
  {{range .DayGroups}}

  <div class="day-header">
    <div class="day-node"></div>
    <span class="day-label">{{.DateLabel}}</span>
  </div>

  <div class="day-group">
    <div class="tree-rail">
      <div class="rail-line"></div>
    </div>
    <div class="events">
      {{range .Events}}
      <div class="event">
        <span class="event-time">{{.Time}}</span>
        <span class="event-type t-{{.Type}}">{{.Type}}</span>
        <span class="event-title">{{.Title}}</span>
        {{if .Tags}}<span class="event-tags">{{.Tags}}</span>{{end}}
      </div>
      {{end}}
    </div>
  </div>

  {{end}}
  {{else}}
  <div class="empty">no events in this range.</div>
  {{end}}

  <div class="footer">brain · {{.GeneratedAt}}</div>

</body>
</html>
